name: Publish to npm
on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write 
      
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - run: pnpm add -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Publish to npm
        run: NODE_AUTH_TOKEN="" npm publish --no-git-checks --provenance --access public
